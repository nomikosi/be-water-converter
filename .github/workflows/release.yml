name: Release

# Publishes to JetBrains Marketplace when a v* tag is pushed:
#   git tag v1.4.0 && git push --tags
# Requires the PUBLISH_TOKEN repository secret (JetBrains Marketplace
# permanent token: https://plugins.jetbrains.com/author/me/tokens).
on:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test and build
        run: ./gradlew check buildPlugin --console=plain

      - name: Verify plugin compatibility
        run: ./gradlew verifyPlugin --console=plain

      - name: Publish to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew publishPlugin --console=plain

      - name: Create GitHub release with plugin ZIP
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*.zip
          generate_release_notes: true
